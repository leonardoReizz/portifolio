server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index Portfolio.html index.html;

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|jpg|jpeg|png|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /Portfolio.html {
        add_header Cache-Control "no-cache";
    }
    location ~ ^/projects/?$ {
        try_files /projects/index.html =404;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /Portfolio.html;
}
