<!doctype html>
<html lang="pt-BR">
<head>

<title>Arquitetura · Leonardo Reis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap">
<style>
  :root {
    --accent: #C6FF4B;
    --accent-soft: color-mix(in oklab, var(--accent) 18%, transparent);
    --bg: #07080a; --bg-2: #0d0f12; --bg-3: #12151a;
    --line: #1a1d23; --line-2: #24282f;
    --fg: #f2f3f5; --fg-2: #b6bac1; --fg-3: #6b707a;
    --grid: rgba(255,255,255,0.04);
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-serif: "Instrument Serif", Georgia, serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  :root[data-theme="light"] {
    --bg: #f4f3ee; --bg-2: #eceae3; --bg-3: #e3e1d8;
    --line: #d8d5cb; --line-2: #c5c1b4;
    --fg: #0a0a0a; --fg-2: #3b3b3b; --fg-3: #7a7a78;
    --grid: rgba(0,0,0,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--fg); font-family: var(--font-display); -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; cursor: none; }
  @media (max-width: 820px) { body { cursor: auto; } .cursor, .cursor-dot { display: none !important; } }
  a { color: inherit; text-decoration: none; }
  button { background: none; border: 0; color: inherit; font: inherit; cursor: none; }
  ::selection { background: var(--accent); color: #000; }

  .cursor, .cursor-dot {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width .22s, height .22s, background .22s, border-color .22s, opacity .2s;
  }
  .cursor { width: 36px; height: 36px; border: 1px solid var(--fg-2); border-radius: 999px; mix-blend-mode: difference; }
  .cursor-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 999px; }
  .cursor.is-link { width: 70px; height: 70px; border-color: var(--accent); background: var(--accent-soft); }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: .035; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at 50% 0%, black 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 0%, transparent 70%);
  }
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 40px; mix-blend-mode: difference;
  }
  .nav .mono { font-family: var(--font-mono); font-size: 12px; letter-spacing: .04em; color: #fff; }
  .nav-mark { display: flex; align-items: center; gap: 10px; color: #fff; }
  .nav-mark .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .nav-back { font-family: var(--font-mono); font-size: 12px; color: #fff; opacity: .8; }
  .nav-back:hover { opacity: 1; color: var(--accent); }
  @media (max-width: 720px) { .nav { padding: 18px 20px; } }

  main { position: relative; z-index: 1; padding: 140px 40px 80px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 720px) { main { padding: 110px 20px 60px; } }

  .head { display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: end; padding-bottom: 40px; border-bottom: 1px solid var(--line); }
  @media (max-width: 860px) { .head { grid-template-columns: 1fr; } }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--fg-3); display: inline-flex; align-items: center; gap: 10px; }
  .eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--accent); }
  h1.title { font-family: var(--font-display); font-weight: 500; line-height: .9; letter-spacing: -0.05em; font-size: clamp(54px, 9vw, 140px); margin-top: 20px; }
  h1.title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--accent); }
  .head-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); line-height: 2; text-align: right; }
  @media (max-width: 860px) { .head-meta { text-align: left; } }
  .head-meta span { color: var(--fg); }
  .head-meta .status { color: var(--accent); }

  .top { display: grid; grid-template-columns: 1.4fr 1fr; gap: 40px; padding: 48px 0; border-bottom: 1px solid var(--line); }
  @media (max-width: 860px) { .top { grid-template-columns: 1fr; gap: 28px; } }
  .overview-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 18px; }
  .overview-text { font-family: var(--font-display); font-size: clamp(18px, 1.5vw, 24px); line-height: 1.45; color: var(--fg); letter-spacing: -0.01em; }
  .stack-box { background: var(--bg-2); border: 1px solid var(--line); border-radius: 14px; padding: 22px; }
  .stack-box h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 16px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-family: var(--font-mono); font-size: 11px; padding: 5px 10px; border: 1px solid var(--line-2); border-radius: 999px; color: var(--fg-2); transition: all .2s; }
  .chip:hover { color: var(--accent); border-color: var(--accent); }
  .cta-row { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { position: relative; display: inline-flex; align-items: center; gap: 10px; padding: 12px 20px; border: 1px solid var(--line-2); border-radius: 999px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; color: var(--fg); overflow: hidden; transition: color .25s, border-color .25s; cursor: none; }
  .btn::before { content: ""; position: absolute; inset: 0; background: var(--accent); transform: translateY(100%); transition: transform .35s cubic-bezier(.6,.05,.2,1); z-index: -1; }
  .btn:hover { color: #000; border-color: var(--accent); }
  .btn:hover::before { transform: translateY(0); }

  .diagram-wrap { padding: 48px 0; border-bottom: 1px solid var(--line); }
  .diagram-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
  .diagram-head h2 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.03em; line-height: 1; font-size: clamp(30px, 4vw, 52px); }
  .diagram-head h2 em { font-family: var(--font-serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .diagram { border: 1px solid var(--line); border-radius: 18px; background: var(--bg-2); padding: 30px; position: relative; overflow: hidden; }
  .diagram::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 32px 32px; opacity: .35; pointer-events: none; mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%); -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%); }
  svg.arch { display: block; width: 100%; height: auto; position: relative; z-index: 1; }

  .layers-wrap { padding: 48px 0; }
  .layers-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; flex-wrap: wrap; gap: 10px; }
  .layers-head h2 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.03em; line-height: 1; font-size: clamp(30px, 4vw, 52px); }
  .layers-head h2 em { font-family: var(--font-serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .layers { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 860px) { .layers { grid-template-columns: 1fr; } }
  .layer { border: 1px solid var(--line); border-radius: 14px; background: var(--bg-2); padding: 22px; display: flex; flex-direction: column; gap: 14px; transition: border-color .3s; position: relative; overflow: hidden; }
  .layer::after { content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(400px circle at var(--mx, 50%) var(--my, 50%), var(--accent-soft), transparent 60%); opacity: 0; transition: opacity .35s; }
  .layer:hover { border-color: var(--line-2); }
  .layer:hover::after { opacity: 1; }
  .layer > * { position: relative; z-index: 1; }
  .layer-top { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; }
  .layer-num { font-family: var(--font-mono); font-size: 11px; color: var(--accent); letter-spacing: .1em; }
  .layer-name { font-family: var(--font-display); font-weight: 500; font-size: 22px; letter-spacing: -0.02em; line-height: 1.15; }
  .layer-desc { font-size: 14px; line-height: 1.55; color: var(--fg-2); }

  .back-foot { margin-top: 60px; padding-top: 28px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: .06em; }
  .back-foot a:hover { color: var(--accent); }

  .proj-nav { margin-top: 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .proj-nav { grid-template-columns: 1fr; } }
  .proj-nav a { border: 1px solid var(--line); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-2); transition: border-color .3s; }
  .proj-nav a:hover { border-color: var(--accent); }
  .proj-nav .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: .14em; text-transform: uppercase; }
  .proj-nav .nm { font-family: var(--font-display); font-weight: 500; font-size: 24px; letter-spacing: -0.02em; }
  .proj-nav .nm em { font-family: var(--font-serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .proj-nav .next { text-align: right; }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .7s, transform .7s cubic-bezier(.2,.8,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal.d1 { transition-delay: .08s; } .reveal.d2 { transition-delay: .16s; } .reveal.d3 { transition-delay: .24s; } .reveal.d4 { transition-delay: .32s; }

  .arch .box { fill: var(--bg-3); stroke: var(--line-2); stroke-width: 1; transition: all .3s; }
  .arch .box.accent { stroke: var(--accent); fill: color-mix(in oklab, var(--accent) 10%, var(--bg-3)); }
  .arch .box-label { font-family: var(--font-display); font-weight: 500; font-size: 14px; fill: var(--fg); }
  .arch .box-sub { font-family: var(--font-mono); font-size: 10px; fill: var(--fg-3); letter-spacing: .05em; }
  .arch .line { stroke: var(--line-2); stroke-width: 1.2; fill: none; marker-end: url(#arr); }
  .arch .line.accent { stroke: var(--accent); }
  .arch .lane { font-family: var(--font-mono); font-size: 10px; fill: var(--fg-3); letter-spacing: .14em; text-transform: uppercase; }
  .arch .lane-rect { fill: none; stroke: var(--line); stroke-dasharray: 3 4; }
  .arch .flow { stroke-dasharray: 6 6; animation: flow 2.5s linear infinite; }
  @keyframes flow { to { stroke-dashoffset: -24; } }

  .nf { text-align: center; padding: 140px 20px; }
  .nf h2 { font-family: var(--font-display); font-size: 48px; letter-spacing: -0.03em; margin-bottom: 16px; }
  .nf p { color: var(--fg-2); margin-bottom: 28px; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<main id="app"></main>

<script>
const PROJECTS = [
  { slug: "imovdigital", title: "ImovDigital", kind: "SaaS · Imobiliário", status: "Founder · Produção", year: "2026", demo: "https://imovdigital.com.br", tags: ["React","Next.js","TypeScript","Node.js","PostgreSQL","Prisma","Tailwind CSS"], overview: "Arquitetura multi-tenant SaaS com separação clara entre frontend, backend API e painel administrativo. Cada imobiliária possui seu próprio subdomínio e dados isolados via tenant ID no banco de dados.", layers: [ { name: "Frontend (Sites das Imobiliárias)", desc: "Next.js com SSR para SEO otimizado. Cada imobiliária recebe um site próprio com subdomínio personalizado, listagem de imóveis, busca avançada e páginas de contato.", tech: ["Next.js","React","TypeScript","Tailwind"] }, { name: "Painel Administrativo", desc: "Dashboard para imobiliárias gerenciarem imóveis, leads, configurações do site e ferramentas de marketing digital.", tech: ["React","TypeScript","Tailwind"] }, { name: "API Backend", desc: "API RESTful com autenticação JWT, upload de imagens, gestão de tenants e integrações externas. Arquitetura modular por domínios.", tech: ["Node.js","TypeScript","Prisma"] }, { name: "Banco de Dados", desc: "PostgreSQL multi-tenant com tenant ID para isolamento. Migrations via Prisma com índices otimizados para buscas de imóveis.", tech: ["PostgreSQL","Prisma"] } ], diagram: "imovdigital" },
  { slug: "proposely", title: "Proposely", kind: "SaaS · IA Comercial", status: "Produção", year: "2025", demo: "https://proposelylp.cap.leonardo-reis.com", tags: ["React","TypeScript","Node.js","Fastify","Prisma","PostgreSQL","Stripe","OpenAI"], overview: "SaaS com integração de IA para geração automática de propostas comerciais. Backend Fastify de alta performance, pagamentos via Stripe e geração de conteúdo com OpenAI.", layers: [ { name: "Frontend", desc: "Aplicação React com editor de propostas interativo, preview em tempo real, múltiplos templates e exportação PDF.", tech: ["React","TypeScript","Tailwind"] }, { name: "API Backend", desc: "API Fastify com alta performance, autenticação, geração de propostas com IA e webhooks para processamento de pagamentos.", tech: ["Fastify","TypeScript","Node.js"] }, { name: "Integração IA", desc: "Pipeline de geração de conteúdo com OpenAI, criando propostas automaticamente baseadas em parâmetros do usuário.", tech: ["OpenAI API"] }, { name: "Pagamentos & Banco", desc: "Integração Stripe para assinaturas e pagamentos recorrentes. PostgreSQL com Prisma para persistência.", tech: ["Stripe","PostgreSQL","Prisma"] } ], diagram: "proposely" },
  { slug: "aegis-vault", title: "Aegis Vault", kind: "Desktop · Criptografia", status: "Release", year: "2024", demo: "https://aegisvault.leonardo-reis.com", repo: "https://github.com/leonardoReizz/aegis-vault", tags: ["React","Rust","Tauri","AES-256","MongoDB","Tailwind CSS","CI/CD"], overview: "Aplicação desktop multiplataforma construída com Tauri (Rust + React). Criptografia end-to-end no lado do cliente com núcleo Rust garantindo segurança máxima dos dados.", layers: [ { name: "Frontend (UI)", desc: "Interface React renderizada dentro do Tauri WebView. Design moderno com Tailwind para gestão intuitiva de senhas.", tech: ["React","TypeScript","Tailwind"] }, { name: "Core (Rust / Tauri)", desc: "Backend nativo em Rust responsável por criptografia, gerenciamento de arquivos e comunicação segura com o SO.", tech: ["Rust","Tauri"] }, { name: "Criptografia", desc: "AES-256 implementado em Rust para proteção dos dados sensíveis. Chaves derivadas da master password do usuário.", tech: ["AES-256","Rust"] }, { name: "Persistência", desc: "MongoDB para sincronização segura entre dispositivos. Dados sempre armazenados criptografados.", tech: ["MongoDB"] } ], diagram: "aegis" },
  { slug: "sentra-api", title: "SentraAPI", kind: "Monitoramento · Eventos", status: "Produção", year: "2024", demo: "https://sentra-web.cap.leonardo-reis.com", tags: ["React","Next.js","NestJS","BullMQ","RabbitMQ","MySQL","Redis","Docker"], overview: "Plataforma de monitoramento de APIs com arquitetura orientada a eventos. Workers processam health checks de forma assíncrona usando filas, com notificações em tempo real e dashboards de métricas.", layers: [ { name: "Frontend (Dashboard)", desc: "Dashboard Next.js com gráficos de métricas em tempo real, configuração de endpoints monitorados e histórico de incidentes.", tech: ["Next.js","React","TypeScript"] }, { name: "API Backend", desc: "API NestJS modular com injeção de dependências para gestão de monitores, usuários e notificações.", tech: ["NestJS","TypeScript"] }, { name: "Workers & Filas", desc: "Workers BullMQ processam health checks periódicos. RabbitMQ para comunicação entre serviços e processamento de eventos.", tech: ["BullMQ","RabbitMQ","Redis"] }, { name: "Infraestrutura", desc: "Containers Docker orquestrados com docker-compose. MySQL para persistência e Redis para cache e filas.", tech: ["Docker","MySQL","Redis"] } ], diagram: "sentra" },
  { slug: "touchaba", title: "TouchABA", kind: "Healthtech · Clínicas", status: "Produção", year: "2023", demo: "https://touchaba.com/", tags: ["React","Node.js","PostgreSQL","Amazon S3","Docker"], overview: "Sistema web para clínicas de terapia ABA com gestão de pacientes, sessões, relatórios clínicos e equipe terapêutica.", layers: [ { name: "Frontend", desc: "Aplicação React para gestão de pacientes, agendamento de sessões e visualização de relatórios clínicos.", tech: ["React"] }, { name: "API Backend", desc: "API Node.js para gerenciamento de dados clínicos, autenticação e regras de negócio.", tech: ["Node.js"] }, { name: "Banco de Dados", desc: "PostgreSQL para persistência de dados clínicos, pacientes, sessões e relatórios.", tech: ["PostgreSQL"] }, { name: "Storage de Arquivos", desc: "Amazon S3 para armazenamento de anexos clínicos, documentos e mídias das sessões terapêuticas.", tech: ["Amazon S3"] }, { name: "Infraestrutura", desc: "Deploy containerizado com Docker para portabilidade e consistência entre ambientes.", tech: ["Docker"] } ], diagram: "touchaba" },
  { slug: "associacao-aconchego", title: "Associação Aconchego", kind: "Institucional · Landing", status: "Live", year: "2023", demo: "https://associacaoaconchego.com/", tags: ["React","Node.js","MongoDB","Tailwind CSS"], overview: "Landing page institucional com backend para gestão de conteúdo e formulários de contato.", layers: [ { name: "Frontend", desc: "Landing page responsiva com React e Tailwind, focada em apresentação institucional e captação de voluntários.", tech: ["React","Tailwind"] }, { name: "Backend & Banco", desc: "API Node.js para processamento de formulários e gestão de conteúdo dinâmico. MongoDB para persistência.", tech: ["Node.js","MongoDB"] } ], diagram: "simple" },
  { slug: "nativesec", title: "Nativesec", kind: "Interno · Gestão", status: "Live", year: "2023", demo: "https://nativesec.io", repo: "https://github.com/Nativesec/nativesec-desktop", tags: ["TypeScript","Next.js","PostgreSQL","Prisma"], overview: "Aplicação web Next.js para gerenciamento de tarefas e segurança, com calendário interativo e geração de relatórios.", layers: [ { name: "Frontend", desc: "Aplicação Next.js com calendário interativo, dashboard de gerenciamento e geração de relatórios.", tech: ["Next.js","TypeScript"] }, { name: "Backend & Banco", desc: "API Next.js com Prisma ORM e PostgreSQL para persistência de dados.", tech: ["PostgreSQL","Prisma"] } ], diagram: "simple" },
  { slug: "gita", title: "Gita", kind: "Platform · Kubernetes", status: "Produção", year: "2023", demo: "https://gita.cloud", tags: ["React.js","Next.js","Node.js","Python","GoLang","Docker","MongoDB","RabbitMQ","Stripe"], overview: "Plataforma distribuída de gerenciamento e observabilidade para clusters Kubernetes. 3 microsserviços independentes (Node.js e Python) comunicando via RabbitMQ, com agentes GoLang rodando diretamente nos clusters dos clientes.", layers: [ { name: "Frontend (Dashboard)", desc: "Dashboard Next.js com visualização de clusters, pods, métricas e logs em tempo real.", tech: ["Next.js","React"] }, { name: "Microsserviço de Pagamentos", desc: "Microsserviço Node.js dedicado ao billing com Stripe. Gerencia assinaturas, contagem de nó/hora para cobrança proporcional e webhooks.", tech: ["Node.js","Stripe"] }, { name: "Microsserviço de Orquestração", desc: "Microsserviço principal em Node.js responsável pela API REST, autenticação, gestão de clusters e comunicação com os agentes via RabbitMQ.", tech: ["Node.js","Express","MongoDB"] }, { name: "Microsserviço de Métricas", desc: "Microsserviço Python para processamento e agregação de métricas coletadas dos clusters.", tech: ["Python"] }, { name: "Agente Kubernetes (Go)", desc: "Agente leve em GoLang deployado nos clusters dos clientes. Coleta métricas, executa comandos e reporta status via RabbitMQ.", tech: ["GoLang","Kubernetes"] }, { name: "Mensageria & Infra", desc: "RabbitMQ como backbone de comunicação. MongoDB para persistência. Docker para deploy dos serviços.", tech: ["RabbitMQ","MongoDB","Docker"] } ], diagram: "gita" }
];

const params = new URLSearchParams(location.search);
let slug = params.get('p') || 'imovdigital';
const idx = PROJECTS.findIndex(p => p.slug === slug);
const project = idx >= 0 ? PROJECTS[idx] : null;
const prev = idx > 0 ? PROJECTS[idx - 1] : PROJECTS[PROJECTS.length - 1];
const next = idx >= 0 && idx < PROJECTS.length - 1 ? PROJECTS[idx + 1] : PROJECTS[0];

const app = document.getElementById('app');

if (!project) {
  app.innerHTML = `<div class="nf"><h2>Projeto não encontrado</h2><p>O projeto "${slug}" não está na lista.</p><a href="../Portfolio.html#work" class="btn">Ver todos os projetos</a></div>`;
} else {
  renderProject(project);
}

function chipHTML(t) { return `<span class="chip">${t}</span>`; }

function titleWithAccent(t) {
  const parts = t.split(/(\s+)/);
  if (parts.length >= 3) { parts[parts.length - 1] = `<em>${parts[parts.length - 1]}</em>`; return parts.join(''); }
  const m = t.match(/^([A-Z][a-z]+)([A-Z].*)$/);
  if (m) return `${m[1]}<em>${m[2]}</em>`;
  return t;
}

function box(x, y, w, h, label, sub, accent) {
  return `<g><rect class="box ${accent ? 'accent' : ''}" x="${x}" y="${y}" width="${w}" height="${h}" rx="10"/><text class="box-label" x="${x + 16}" y="${y + 26}">${label}</text>${sub ? `<text class="box-sub" x="${x + 16}" y="${y + 46}">${sub}</text>` : ''}</g>`;
}
function line(x1, y1, x2, y2, accent) {
  if (x1 === x2 || y1 === y2) return `<line class="line ${accent ? 'accent flow' : ''}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${accent ? 'marker-end="url(#arr-accent)"' : ''}/>`;
  return `<path class="line ${accent ? 'accent flow' : ''}" d="M${x1},${y1} L${x1},${y2} L${x2},${y2}" ${accent ? 'marker-end="url(#arr-accent)"' : ''}/>`;
}

function wire() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  document.querySelectorAll('.layer').forEach(c => {
    c.addEventListener('pointermove', e => {
      const r = c.getBoundingClientRect();
      c.style.setProperty('--mx', (e.clientX - r.left) + 'px');
      c.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
  });
  document.querySelectorAll('[data-link], button, a').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('is-link'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('is-link'));
  });
}

const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let cx = window.innerWidth/2, cy = window.innerHeight/2, tx = cx, ty = cy;
window.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; cursorDot.style.transform = `translate(${tx}px, ${ty}px) translate(-50%,-50%)`; });
(function anim(){
  cx += (tx - cx) * 0.18; cy += (ty - cy) * 0.18;
  cursor.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;
  requestAnimationFrame(anim);
})();
</script>
